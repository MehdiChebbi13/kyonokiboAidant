<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kyonokibo Aidant - Stats</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="./stats.css">
  </head>
  <body>
    <div class="app-shell">
      <aside id="app-sidebar"></aside>

      <main class="main-content">
        <header class="page-header">
          <div>
            <h1 class="page-title">Statistiques</h1>
            <p class="page-subtitle">Suivi cognitif de Jean Martin</p>
          </div>
          <div class="stats-head-actions">
            <button class="btn btn-ghost" type="button">
              <span class="btn-label">
                <span data-app-icon="download" data-app-icon-size="14"></span>
                <span>Exporter</span>
              </span>
            </button>
          </div>
        </header>

        <section class="stats-kpi-bento" id="stats-kpis"></section>

        <section class="stats-bento">
          <article class="card stats-card stats-card-chart">
            <div class="stats-card-head chart-card-head">
              <h2 class="section-title small">Score dans le temps</h2>
              <div class="chart-range-tabs" id="chart-range-tabs"></div>
            </div>
            <div class="line-chart-wrap" id="line-chart-root"></div>
            <div class="weekly-summary" id="weekly-summary"></div>
          </article>

          <article class="card stats-card stats-card-rings">
            <h2 class="section-title small">Repartition des reponses</h2>
            <div id="rings-root" class="rings-root"></div>
          </article>

          <article class="card stats-card stats-card-indicators">
            <h2 class="section-title small">Indicateurs cles</h2>
            <div id="indicators-root"></div>
          </article>

          <article class="card stats-card stats-card-breakdown">
            <h2 class="section-title small">Recapitulatif par quiz</h2>
            <div class="breakdown-table">
              <div class="breakdown-head">
                <span>Quiz</span>
                <span>Score</span>
                <span>Parties</span>
                <span>Tendance</span>
              </div>
              <div id="breakdown-body"></div>
            </div>
          </article>

          <article class="card stats-card stats-card-insights">
            <h2 class="section-title small">Observations</h2>
            <div class="insight-grid" id="insights-root"></div>
          </article>
        </section>
      </main>
    </div>

    <script src="../script.js"></script>
    <script src="./stats.js"></script>
  </body>
</html>

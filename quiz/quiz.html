<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kyonokibo Aidant - Quiz</title>
    <link rel="stylesheet" href="../style.css" />
    <link rel="stylesheet" href="./quizz.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside id="app-sidebar"></aside>

      <main class="main-content">
        <header class="page-header">
          <div>
            <h1 class="page-title">Quiz</h1>
            <p class="page-subtitle">
              Quiz du jour et quiz personnalises de Jean
            </p>
          </div>
          <button class="btn btn-primary hidden" id="create-quiz-top">
            <span class="btn-label">
              <span
                data-app-icon="plus"
                data-app-icon-size="15"
                data-app-icon-color="currentColor"
              ></span>
              <span>Creer un quiz</span>
            </span>
          </button>
        </header>

        <nav class="tab-switch" id="quiz-tabs">
          <button class="tab-btn active" data-tab="daily">Quiz du jour</button>
          <button class="tab-btn" data-tab="custom">Quiz personnalises</button>
        </nav>

        <section class="quiz-section" id="daily-section">
          <div class="quiz-layout">
            <div class="quiz-main-column">
              <article class="card quiz-config-card">
                <h2 class="section-title">Configuration globale</h2>
                <div id="daily-config-list"></div>
              </article>

              <article class="card quiz-today-card">
                <div class="quiz-today-top">
                  <h2 class="section-title">Quiz d&apos;aujourd&apos;hui</h2>
                  <span class="badge badge-green">Termin&#233;</span>
                </div>
                <div class="quiz-metrics">
                  <div><strong>10</strong><span>Pr&#233;vu</span></div>
                  <div><strong>7 / 10</strong><span>score</span></div>
                  <div><strong>9m32</strong><span>dur&#233;e</span></div>
                </div>
                <div class="quiz-lines" id="daily-question-preview"></div>
              </article>
            </div>

            <aside class="quiz-side-column">
              <article class="card flow-card">
                <h3 class="section-title small">
                  Aper&#231;u du fonctionnement
                </h3>
                <div id="daily-flow-list"></div>
              </article>

              <article class="card week-card">
                <h3 class="section-title small">Cette semaine</h3>
                <div id="week-summary-list"></div>
              </article>
            </aside>
          </div>
        </section>

        <section class="quiz-section hidden" id="custom-section">
          <div class="custom-header">
            <p class="custom-count" id="custom-count"></p>
            <button
              class="btn btn-primary"
              id="create-quiz-inline"
              type="button"
            >
              <span class="btn-label">
                <span
                  data-app-icon="plus"
                  data-app-icon-size="15"
                  data-app-icon-color="currentColor"
                ></span>
                <span>Cr&#233;er un quiz</span>
              </span>
            </button>
          </div>
          <div class="quiz-grid" id="custom-quiz-grid"></div>
        </section>
      </main>
    </div>

    <div class="modal-overlay hidden" id="quiz-modal">
      <div class="modal-box quiz-modal-box">
        <div class="modal-top">
          <h2 class="section-title" id="quiz-modal-title">Nouveau quiz</h2>
          <button class="btn btn-ghost" id="close-quiz-modal" type="button">
            <span class="btn-label">
              <span data-app-icon="close" data-app-icon-size="14"></span>
              <span>Fermer</span>
            </span>
          </button>
        </div>

        <form id="quiz-form" class="quiz-builder-form" novalidate>
          <div class="builder-stepbar" id="quiz-builder-stepbar"></div>
          <div class="builder-content" id="quiz-builder-content"></div>
          <div class="builder-actions" id="quiz-builder-actions"></div>
        </form>
      </div>
    </div>

    <div class="modal-overlay hidden" id="preview-modal">
      <div class="modal-box preview-box">
        <div class="modal-top">
          <h2 class="section-title" id="preview-title"></h2>
          <button class="btn btn-ghost" id="close-preview" type="button">
            <span class="btn-label">
              <span data-app-icon="close" data-app-icon-size="14"></span>
              <span>Fermer</span>
            </span>
          </button>
        </div>
        <div id="preview-content"></div>
      </div>
    </div>

    <script src="../script.js"></script>
    <script src="./quiz.js"></script>
  </body>
</html>

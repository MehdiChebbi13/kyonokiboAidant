<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fiche Patient</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="patient.css">
  <script src="patient.js" defer></script>

</head>
<body>

  <!-- ══════════════════════════════════
       HEADER
  ══════════════════════════════════ -->
  <header class="app-header">
    <button class="btn-back" onclick="goBack()">
      <span class="back-arrow">←</span>
      <span>Retour</span>
    </button>
    <div class="header-label">Fiche Patient</div>
    <div class="header-spacer"></div>
  </header>

  <!-- ══════════════════════════════════
       CONTENU PRINCIPAL
  ══════════════════════════════════ -->
  <main class="page">

    <!-- CARTE IDENTITÉ -->
    <section class="card card-identity" id="card-identity">
      <div class="identity-bg"></div>

      <div class="avatar-wrap">
        <img id="patientAvatar" src="https://i.pravatar.cc/160" alt="Photo du patient">
        <div class="avatar-status" id="avatarStatus"></div>
      </div>

      <div class="identity-info">
        <div class="patient-tag" id="patientTag">Patient</div>
        <h1 class="patient-name" id="patientName">—</h1>
        <div class="patient-meta">
          <span class="meta-chip" id="patientAgeChip">
            <span class="meta-icon">🎂</span>
            <span id="patientAge">—</span> ans
          </span>
          <span class="meta-chip" id="patientSexeChip">
            <span class="meta-icon">👤</span>
            <span id="patientSexe">—</span>
          </span>
          <span class="meta-chip" id="patientGroupeChip">
            <span class="meta-icon">🩸</span>
            <span id="patientGroupe">—</span>
          </span>
        </div>
      </div>
    </section>

    <!-- GRILLE D'INFORMATIONS -->
    <div class="info-grid">

      <!-- Pathologie -->
      <section class="card card-info" id="card-pathologie">
        <div class="card-icon">🫀</div>
        <div class="card-content">
          <div class="card-label">Pathologie</div>
          <div class="card-value" id="patientDisease">—</div>
        </div>
      </section>

      <!-- Médecin traitant -->
      <section class="card card-info" id="card-medecin">
        <div class="card-icon">👨‍⚕️</div>
        <div class="card-content">
          <div class="card-label">Médecin traitant</div>
          <div class="card-value" id="patientMedecin">—</div>
        </div>
      </section>

      <!-- Chambre -->
      <section class="card card-info" id="card-chambre">
        <div class="card-icon">🏥</div>
        <div class="card-content">
          <div class="card-label">Chambre</div>
          <div class="card-value" id="patientChambre">—</div>
        </div>
      </section>

      <!-- Date d'entrée -->
      <section class="card card-info" id="card-entree">
        <div class="card-icon">📅</div>
        <div class="card-content">
          <div class="card-label">Date d'entrée</div>
          <div class="card-value" id="patientEntree">—</div>
        </div>
      </section>

    </div><!-- /.info-grid -->

    <!-- ALLERGIES -->
    <section class="card card-block" id="card-allergies">
      <div class="block-header">
        <span class="block-icon">⚠️</span>
        <span class="block-title">Allergies & contre-indications</span>
      </div>
      <div class="tag-list" id="patientAllergies">
        <span class="tag tag-none">Aucune allergie connue</span>
      </div>
    </section>

    <!-- TRAITEMENTS EN COURS -->
    <section class="card card-block" id="card-traitements">
      <div class="block-header">
        <span class="block-icon">💊</span>
        <span class="block-title">Traitements en cours</span>
      </div>
      <ul class="treatment-list" id="patientTraitements">
        <li class="treatment-empty">Aucun traitement renseigné</li>
      </ul>
    </section>

    <!-- NOTES INFIRMIÈRES -->
    <section class="card card-block" id="card-notes">
      <div class="block-header">
        <span class="block-icon">📝</span>
        <span class="block-title">Notes infirmières</span>
      </div>
      <div class="notes-text" id="patientNotes">Aucune note pour ce patient.</div>
    </section>

  </main><!-- /.page -->

  <!-- Script -->
  <script src="fiche-patient.js"></script>

</body>
</html>
